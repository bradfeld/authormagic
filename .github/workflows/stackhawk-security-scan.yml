name: StackHawk Security Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run weekly security scans on Sundays at 2 AM UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:
    # Allow manual trigger

jobs:
  stackhawk-security-scan:
    runs-on: ubuntu-latest
    name: StackHawk Security Scan
    permissions:
      contents: read
      security-events: write
      actions: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run StackHawk HawkScan
        uses: stackhawk/hawkscan-action@v2.1.3
        with:
          apiKey: ${{ secrets.HAWK_API_KEY }}
          codeScanningAlerts: true
          githubToken: ${{ github.token }}
        env:
          # Authentication credentials for testing protected routes
          SCAN_USERNAME: ${{ secrets.SCAN_USERNAME }}
          SCAN_PASSWORD: ${{ secrets.SCAN_PASSWORD }}

      - name: Upload scan results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stackhawk-scan-results
          path: |
            hawkscan-*.json
            hawkscan-*.html
          retention-days: 30

      - name: Comment PR with scan results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const scanResults = fs.readFileSync('hawkscan-results.json', 'utf8');
              const results = JSON.parse(scanResults);
              
              const comment = `## 🔒 StackHawk Security Scan Results
              
              **Scan Status:** ${results.status || 'Completed'}
              **Vulnerabilities Found:** ${results.alertCounts?.total || 0}
              - High: ${results.alertCounts?.high || 0}
              - Medium: ${results.alertCounts?.medium || 0}
              - Low: ${results.alertCounts?.low || 0}
              
              ${results.alertCounts?.total > 0 ? '⚠️ Security issues detected. Please review the scan results.' : '✅ No security vulnerabilities detected.'}
              
              View detailed results in the [StackHawk Platform](https://app.stackhawk.com)`;
              
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            } catch (error) {
              console.log('Could not read scan results file');
            } 